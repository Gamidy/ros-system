      - OAuth2PasswordBearer: []
      parameters:
      - name: action
        in: query
        required: true
        schema:
          type: string
          description: '计算类型: btu_to_w | person_months | cert_costs'
          title: Action
        description: '计算类型: btu_to_w | person_months | cert_costs'
      - name: capacity_range
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: 冷量段字符串（action=btu_to_w 时必填）
          title: Capacity Range
        description: 冷量段字符串（action=btu_to_w 时必填）
      - name: duration_months
        in: query
        required: false
        schema:
          anyOf:
          - type: integer
          - type: 'null'
          description: 项目周期月数（action=person_months 时必填）
          title: Duration Months
        description: 项目周期月数（action=person_months 时必填）
      - name: occupancy_rate
        in: query
        required: false
        schema:
          anyOf:
          - type: number
          - type: 'null'
          description: 人员投入占比 0~1（action=person_months 时必填）
          title: Occupancy Rate
        description: 人员投入占比 0~1（action=person_months 时必填）
      - name: safety_compliance
        in: query
        required: false
        schema:
