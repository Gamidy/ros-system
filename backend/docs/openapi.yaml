openapi: 3.1.0
info:
  title: ROS (R&D Operations System)
  description: ROS (R&D Operations System) API - 空调产品研发运营系统
  contact:
    name: ROS Team
    url: https://ros-system.dev/
    email: ros@nousresearch.com
  license:
    name: Proprietary
    url: https://ros-system.dev/license
  version: 1.0.0
paths:
  /api/auth/login:
    post:
      tags:
      - 认证
      summary: Login
      operationId: login_api_auth_login_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Token'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/auth/logout:
    post:
      tags:
      - 认证
      summary: Logout
      description: 登出：将当前 token 加入黑名单使其失效
      operationId: logout_api_auth_logout_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
      security:
      - OAuth2PasswordBearer: []
  /api/auth/register:
    post:
      tags:
      - 认证
      summary: Register
      operationId: register_api_auth_register_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreate'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/auth/apply:
    post:
      tags:
      - 认证
      summary: Apply Account
      description: 账号申请 — 开放接口，无需登录
      operationId: apply_account_api_auth_apply_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountApplicationCreate'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountApplicationOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/auth/applications:
    get:
      tags:
      - 认证
      summary: List Applications
      description: 管理员查看所有账号申请
      operationId: list_applications_api_auth_applications_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/AccountApplicationOut'
                type: array
                title: Response List Applications Api Auth Applications Get
      security:
      - OAuth2PasswordBearer: []
  /api/auth/applications/{user_id}/review:
    patch:
      tags:
      - 认证
      summary: Review Application
      description: 管理员审核账号申请
      operationId: review_application_api_auth_applications__user_id__review_patch
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: integer
          title: User Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountApplicationReview'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountApplicationOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/auth/me:
    get:
      tags:
      - 认证
      summary: Get Me
      operationId: get_me_api_auth_me_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserOut'
      security:
      - OAuth2PasswordBearer: []
  /api/auth/password:
    put:
      tags:
      - 认证
      summary: Change Password
      description: 修改当前用户密码
      operationId: change_password_api_auth_password_put
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - OAuth2PasswordBearer: []
  /api/auth/forgot-password:
    post:
      tags:
      - 认证
      summary: Forgot Password
      description: '忘记密码 — 通过手机号+真实姓名验证后重置密码


        验证通过后生成新密码，仅返回成功提示（不返回密码明文）。

        密码将通过短信/邮件发送（待对接）。'
      operationId: forgot_password_api_auth_forgot_password_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/auth/users:
    get:
      tags:
      - 认证
      summary: List Users
      operationId: list_users_api_auth_users_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/UserOut'
                type: array
                title: Response List Users Api Auth Users Get
      security:
      - OAuth2PasswordBearer: []
  /api/products/markets:
    get:
      tags:
      - 产品主线
      summary: List Markets
      description: 列出所有市场
      operationId: list_markets_api_products_markets_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/MarketOut'
                type: array
                title: Response List Markets Api Products Markets Get
      security:
      - OAuth2PasswordBearer: []
    post:
      tags:
      - 产品主线
      summary: Create Market
      description: 添加新市场
      operationId: create_market_api_products_markets_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MarketCreate'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - OAuth2PasswordBearer: []
  /api/products/rules/evaluate-version:
    post:
      tags:
      - 产品主线
      summary: Evaluate Version Change
      description: 评估变更是否需要创建新Version（PR-06, PR-09, PR-10）
      operationId: evaluate_version_change_api_products_rules_evaluate_version_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VersionRuleRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionRuleResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - OAuth2PasswordBearer: []
  /api/products/platforms:
    get:
      tags:
      - 产品主线
      summary: List Platforms
      description: 列出所有平台，可按类型/状态筛选
      operationId: list_platforms_api_products_platforms_get
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: platform_type
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Platform Type
      - name: status
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Status
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PlatformOut'
                title: Response List Platforms Api Products Platforms Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - 产品主线
      summary: Create Platform
      description: '创建新平台（PR-02: 按结构尺寸定义）'
      operationId: create_platform_api_products_platforms_post
      security:
      - OAuth2PasswordBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlatformCreate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlatformOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/products/platforms/{pid}:
    get:
      tags:
      - 产品主线
      summary: Get Platform
      operationId: get_platform_api_products_platforms__pid__get
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: pid
        in: path
        required: true
        schema:
          type: integer
          title: Pid
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlatformOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    patch:
      tags:
      - 产品主线
      summary: Update Platform
      description: 更新平台信息
      operationId: update_platform_api_products_platforms__pid__patch
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: pid
        in: path
        required: true
        schema:
          type: integer
          title: Pid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlatformUpdate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlatformOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/products:
    get:
      tags:
      - 产品主线
      summary: List Products
      description: 列出所有产品，可按平台/市场/容量筛选
      operationId: list_products_api_products_get
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: platform_id
        in: query
        required: false
        schema:
          anyOf:
          - type: integer
          - type: 'null'
          title: Platform Id
      - name: market
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Market
      - name: capacity
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Capacity
      - name: status
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Status
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductOut'
                title: Response List Products Api Products Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - 产品主线
      summary: Create Product
      description: '创建新产品（PR-11: Product = Market × Capacity × Platform）'
      operationId: create_product_api_products_post
      security:
      - OAuth2PasswordBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductCreate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/products/{pid}:
    get:
      tags:
      - 产品主线
      summary: Get Product
      operationId: get_product_api_products__pid__get
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: pid
        in: path
        required: true
        schema:
          type: integer
          title: Pid
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    patch:
      tags:
      - 产品主线
      summary: Update Product
      description: 更新产品信息
      operationId: update_product_api_products__pid__patch
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: pid
        in: path
        required: true
        schema:
          type: integer
          title: Pid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductUpdate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/products/{pid}/markets:
    post:
      tags:
      - 产品主线
      summary: Assign Markets
      description: '为产品分配目标市场（PR-08: Market ≠ Product, 多对多）'
      operationId: assign_markets_api_products__pid__markets_post
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: pid
        in: path
        required: true
        schema:
          type: integer
          title: Pid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductMarketAssign'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/products/{pid}/versions:
    get:
      tags:
      - 产品主线
      summary: List Versions
      description: 列出产品的所有版本
      operationId: list_versions_api_products__pid__versions_get
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: pid
        in: path
        required: true
        schema:
          type: integer
          title: Pid
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/VersionOut'
                title: Response List Versions Api Products  Pid  Versions Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - 产品主线
      summary: Create Version
      description: 创建产品新版本
      operationId: create_version_api_products__pid__versions_post
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: pid
        in: path
        required: true
        schema:
          type: integer
          title: Pid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VersionCreate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/products/versions/{vid}/status:
    patch:
      tags:
      - 产品主线
      summary: Update Version Status
      description: 更新Version生命周期状态（带转换校验）
      operationId: update_version_status_api_products_versions__vid__status_patch
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: vid
        in: path
        required: true
        schema:
          type: integer
          title: Vid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VersionStatusUpdate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/products/versions/{vid}/variants:
    post:
      tags:
      - 产品主线
      summary: Create Variant
      description: '创建制造变体（PR-10: Product Version ≠ MBOM Version）

        同一Version下不同工厂可有不同MBOM'
      operationId: create_variant_api_products_versions__vid__variants_post
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: vid
        in: path
        required: true
        schema:
          type: integer
          title: Vid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ManufacturingVariantCreate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManufacturingVariantOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - 产品主线
      summary: List Variants
      description: 列出版本的所有制造变体
      operationId: list_variants_api_products_versions__vid__variants_get
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: vid
        in: path
        required: true
        schema:
          type: integer
          title: Vid
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ManufacturingVariantOut'
                title: Response List Variants Api Products Versions  Vid  Variants
                  Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/bom/categories:
    get:
      tags:
      - BOM物料管理
      summary: List Categories
      operationId: list_categories_api_bom_categories_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
      security:
      - OAuth2PasswordBearer: []
  /api/bom/parts:
    get:
      tags:
      - BOM物料管理
      summary: List Parts
      description: 列出所有物料，支持关键词/生命周期/CDF标记/分类筛选
      operationId: list_parts_api_bom_parts_get
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: keyword
        in: query
        required: false
        schema:
          type: string
          default: ''
          title: Keyword
      - name: lifecycle
        in: query
        required: false
        schema:
          type: string
          default: ''
          title: Lifecycle
      - name: is_cdf_item
        in: query
        required: false
        schema:
          type: boolean
          title: Is Cdf Item
      - name: category_id
        in: query
        required: false
        schema:
          type: integer
          title: Category Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PartOut'
                title: Response List Parts Api Bom Parts Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - BOM物料管理
      summary: Create Part
      description: 创建物料 — part_no全局唯一
      operationId: create_part_api_bom_parts_post
      security:
      - OAuth2PasswordBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PartCreate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartDetailOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/bom/parts/cdf-expiring:
    get:
      tags:
      - BOM物料管理
      summary: Cdf Expiring
      description: CDF证书即将到期的物料 — 按有效期过滤
      operationId: cdf_expiring_api_bom_parts_cdf_expiring_get
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: days
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          default: 90
          title: Days
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PartDetailOut'
                title: Response Cdf Expiring Api Bom Parts Cdf Expiring Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/bom/parts/{part_id}:
    get:
      tags:
      - BOM物料管理
      summary: Get Part
      description: 获取物料详情 — 含AVL供应商清单
      operationId: get_part_api_bom_parts__part_id__get
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: part_id
        in: path
        required: true
        schema:
          type: integer
          title: Part Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartDetailOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    patch:
      tags:
      - BOM物料管理
      summary: Update Part
      description: 更新物料 — 生命周期/CDF/MQ/MRC字段
      operationId: update_part_api_bom_parts__part_id__patch
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: part_id
        in: path
        required: true
        schema:
          type: integer
          title: Part Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PartUpdate'
      responses:
        '200':
          description: Successful Response
          content:
