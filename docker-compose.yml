# =============================================================================
# ROS 系统 Docker Compose 一键部署配置
# =============================================================================
# 使用方式:
#   1. 确保 .env.prod 文件已配置
#   2. 构建前端: cd frontend && npm run build
#   3. docker compose up -d
# =============================================================================

version: "3.8"

services:
  # ---- MariaDB 数据库 ----
  mariadb:
    image: mariadb:10.11
    container_name: ros-mariadb
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ros_db}
      MYSQL_USER: ${MYSQL_USER:-ros}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: Asia/Shanghai
    volumes:
      - mariadb-data:/var/lib/mysql
      - ./migrations:/docker-entrypoint-initdb.d:ro   # 首次初始化 SQL 脚本
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - ros-network

  # ---- Redis 缓存 / Celery Broker ----
  redis:
    image: redis:7-alpine
    container_name: ros-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-} --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ros-network

  # ---- FastAPI 后端 ----
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ros-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.prod
    environment:
      # 覆盖 .env.prod 中需要动态生成的值
      DB_HOST: mariadb
      DB_PORT: 3306
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-}@redis:6379/1
    volumes:
      - backend-logs:/app/logs
    entrypoint: ["/app/scripts/docker-entrypoint.sh"]
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - ros-network

  # ---- Nginx 前端 ----
  frontend:
    image: nginx:alpine
    container_name: ros-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - ros-network

# ---- 持久化卷 ----
volumes:
  mariadb-data:
    name: ros-mariadb-data
  redis-data:
    name: ros-redis-data
  backend-logs:
    name: ros-backend-logs

# ---- 自定义网络 ----
networks:
  ros-network:
    name: ros-network
    driver: bridge
