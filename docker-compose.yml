# 吉德家用变频空调PLM系统
# 遵循 IPD (集成产品开发) 结构化流程
# 参见 AGENTS.md 获取完整工程契约

version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: plm-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: plm
      POSTGRES_PASSWORD: plm_dev_2026
      POSTGRES_DB: plm
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plm -d plm"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: plm-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://plm:plm_dev_2026@db:5432/plm
      - SECRET_KEY=${SECRET_KEY:-dev-auto-generated-key-not-for-production}
      - ENV=development
      - DEBUG=true
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: plm-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0

volumes:
  pgdata:
